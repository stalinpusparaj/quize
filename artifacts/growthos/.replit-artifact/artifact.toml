kind = "web"
previewPath = "/"
title = "GrowthOS™ AI Business MRI"
version = "1.0.0"
id = "artifacts/growthos"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20945

[services.development]
run = "pnpm --filter @workspace/growthos run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/growthos", "run", "build" ]
serve = "static"
publicDir = "artifacts/growthos/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20945"
BASE_PATH = "/"
